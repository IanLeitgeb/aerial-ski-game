<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aerial Skiing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* Game running in background */
        #bgFrame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
            filter: brightness(0.45) blur(1px);
        }

        /* Dark gradient overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.72) 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        #title {
            font-size: 52px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 40px rgba(180,220,255,0.6), 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        #subtitle {
            font-size: 15px;
            color: #88aacc;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 56px;
        }

        #cards {
            display: flex;
            gap: 32px;
            align-items: stretch;
        }

        .card {
            width: 240px;
            background: rgba(10, 18, 30, 0.82);
            border: 1px solid rgba(100,140,180,0.25);
            border-radius: 16px;
            padding: 36px 28px 32px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(180,220,255,0.45);
            background: rgba(16, 28, 46, 0.92);
        }

        .card.comp { border-color: rgba(68,170,102,0.35); }
        .card.comp:hover { border-color: rgba(68,200,120,0.65); box-shadow: 0 8px 40px rgba(68,170,102,0.25); }

        .card.real { border-color: rgba(170,102,255,0.35); }
        .card.real:hover { border-color: rgba(180,120,255,0.65); box-shadow: 0 8px 40px rgba(150,80,255,0.25); }

        .card-icon {
            font-size: 52px;
            margin-bottom: 18px;
            line-height: 1;
        }

        .card-title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.03em;
            margin-bottom: 10px;
        }

        .card.comp .card-title { color: #88ffaa; }
        .card.real .card-title { color: #cc88ff; }

        .card-desc {
            font-size: 13px;
            color: #778899;
            line-height: 1.6;
            flex: 1;
        }

        .card-btn {
            display: inline-block;
            margin-top: 24px;
            padding: 9px 28px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: transform 0.1s;
        }

        .card-btn:hover { transform: scale(1.04); }

        .card.comp .card-btn {
            background: linear-gradient(135deg, #1a4a2a, #2a7a44);
            color: #88ffaa;
            box-shadow: 0 2px 12px rgba(68,170,102,0.3);
        }

        .card.real .card-btn {
            background: linear-gradient(135deg, #2a1040, #5a2a90);
            color: #cc88ff;
            box-shadow: 0 2px 12px rgba(150,80,255,0.3);
        }
    </style>
</head>
<body>
    <iframe id="bgFrame" src="index.html?world=triple" title="background"></iframe>

    <div id="overlay">
        <div id="title">⛷ Aerial Skiing</div>
        <div id="subtitle">Choose your mode</div>

        <div id="cards">
            <a class="card comp" href="index.html?world=double">
                <div class="card-icon">🏆</div>
                <div class="card-title">Competitive</div>
                <div class="card-desc">Land tricks, earn trophies, and compete in the Olympics. Choose your jump and difficulty.</div>
                <button class="card-btn" onclick="event.preventDefault()">Play ▶</button>
            </a>

            <a class="card real" href="index.html?world=single&mode=realistic">
                <div class="card-icon">🎿</div>
                <div class="card-title">Realistic</div>
                <div class="card-desc">True-to-life physics and controls for a more authentic aerial skiing experience.</div>
                <button class="card-btn" onclick="event.preventDefault()">Play ▶</button>
            </a>
        </div>
    </div>
</body>
</html>
