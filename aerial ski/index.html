<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aerial Skiing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
        #worldMenu { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: sans-serif; }
        #worldBtn { background: #1a2a3a; color: #b8d8ff; border: 1px solid #445566; padding: 5px 14px; cursor: pointer; font-size: 13px; border-radius: 4px; letter-spacing: 0.03em; }
        #worldBtn:hover { background: #243648; }
        #worldList { display: none; position: absolute; left: 0; right: 0; background: #1a2a3a; border: 1px solid #445566; border-top: none; border-radius: 0 0 4px 4px; }
        #worldList div { padding: 6px 14px; color: #b8d8ff; cursor: pointer; font-size: 13px; }
        #worldList div:hover { background: #243648; }
        #worldList div.active { color: #fff; font-weight: bold; }
        #powerMeter { display: none; position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
        #powerMeterLabel { font-family: sans-serif; font-size: 13px; color: #cce8ff; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 22px; text-shadow: 0 1px 4px #000; }
        #powerMeterWrap { position: relative; width: 480px; }
        #powerMeterTrack { width: 100%; height: 18px; background: rgba(0,0,0,0.45); border: 1.5px solid rgba(180,220,255,0.45); border-radius: 9px; overflow: hidden; }
        #powerMeterFill { height: 100%; width: 0%; border-radius: 9px; background: linear-gradient(90deg, #2af 0%, #0f8 60%, #ff4 85%, #f44 100%); transition: none; }
        #powerMeterTicks { position: absolute; top: 0; left: 0; width: 100%; height: 18px; pointer-events: none; }
        .pmTick { position: absolute; top: 0; width: 2px; height: 100%; background: rgba(0,0,0,0.55); }
        .pmTickLabel { position: absolute; top: -20px; transform: translateX(-50%); font-family: sans-serif; font-size: 12px; font-weight: bold; color: #fff; text-shadow: 0 1px 4px #000, 0 0 6px #000; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="powerMeter">
        <div id="powerMeterLabel">Flip Power</div>
        <div id="powerMeterWrap">
            <div id="powerMeterTrack"><div id="powerMeterFill"></div></div>
            <div id="powerMeterTicks"></div>
        </div>
    </div>
    <canvas id="renderCanvas"></canvas>
    <div id="worldMenu">
        <button id="worldBtn">⛷ <span id="worldLabel">Normal</span> ▾</button>
        <div id="worldList">
            <div onclick="location.href='?world=single'">Single</div>
            <div onclick="location.href='?world=double'">Double</div>
            <div onclick="location.href='?world=triple'">Triple</div>
            <div onclick="location.href='?world=quad'">Quad</div>
            <div onclick="location.href='?world=d2t'">Double to Triple</div>
        </div>
    </div>
    <script>
        (function() {
            var wp = new URLSearchParams(location.search).get('world') || 'double';
            document.addEventListener('DOMContentLoaded', function() {
                var labelMap = { single: 'Single', double: 'Double', triple: 'Triple', quad: 'Quad', d2t: 'Double to Triple' };
                document.getElementById('worldLabel').textContent = labelMap[wp] || wp.charAt(0).toUpperCase() + wp.slice(1);
                var items = document.querySelectorAll('#worldList div');
                items.forEach(function(el) { if (el.textContent.toLowerCase() === wp || el.textContent === (labelMap[wp] || '')) el.classList.add('active'); });
                document.getElementById('worldBtn').addEventListener('click', function() {
                    var list = document.getElementById('worldList');
                    list.style.display = list.style.display === 'block' ? 'none' : 'block';
                });
                document.addEventListener('click', function(e) {
                    if (!document.getElementById('worldMenu').contains(e.target))
                        document.getElementById('worldList').style.display = 'none';
                });
            });
        })();
    </script>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
